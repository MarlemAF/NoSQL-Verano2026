
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Consumir API REST</title>

    <style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:rgb(64, 10, 10);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:40px;
}

.container{
    width:100%;
    max-width:650px;
    background:rgb(17,17,17);
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    margin-bottom:30px;
}

.container2{
    width:100%;
    max-width:650px;
    background:rgb(17,17,17);
    padding:30px;
    border-radius:12px;
    box-shadow:5 5px 15px rgba(0,0,0,.15);
}

h1{
    color:white;
    margin-bottom:20px;
}

h2{
    color:white;
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

button{
    width:100%;
    background:#822020;
    color:white;
    border:none;
    padding:12px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
    margin-top:10px;
}

button:hover{
    background:#3f0e0e;
}

hr{
    margin:20px 0;
    border:1px solid #555;
}

#listaPeliculas{
    list-style:none;
}

li{
    background:#eef5ff;
    border-left:5px solid #983e3c;
    padding:15px;
    margin-bottom:12px;
    border-radius:6px;
}

    </style>
</head>

<body>

<div class="container">

    <h1>🎬 Películas</h1>

    <h2>Registrar película</h2>

    <form id="formulario">

        <input
            type="text"
            id="titulo"
            placeholder="Título"
            required
        >

        <input
            type="text"
            id="genero"
            placeholder="Género"
            required
        >

        <input
            type="number"
            id="año"
            placeholder="Año"
            required
        >

        <input
            type="number"
            id="duracion"
            placeholder="Duración"
            required
        >

        <input
            type="text"
            id="idioma"
            placeholder="Idioma"
            required
        >

        <input
            type="number"
            id="calificacion"
            placeholder="Calificación"
            min="0"
            max="10"
            step="0.1"
            required
        >

        <button type="submit">
            Guardar película
        </button>

    </form>

    <hr>

    <button id="btnConsultar">
        Consultar películas
    </button>

</div>

<div class="container2">

    <ul id="listaPeliculas"></ul>

</div>

<script src="api.js"></script>
<script src="app.js"></script>

</body>
</html>
